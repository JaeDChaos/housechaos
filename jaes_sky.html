<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jae's Sky 🌌</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; color:#fff; font-family:Georgia,serif; overflow:hidden; touch-action:none; }
  #canvas { width:100vw; height:100vh; display:block; cursor:grab; }
  #canvas:active { cursor:grabbing; }

  /* ── All UI lives in #overlay so dom-overlay works in VR ── */
  #overlay { position:fixed; inset:0; pointer-events:none; z-index:10; }

  #header {
    position:absolute; top:20px; left:50%; transform:translateX(-50%);
    text-align:center; transition:opacity 1.5s;
  }
  #header h1 { font-size:1.3em; color:#c8b8f8; letter-spacing:3px; text-shadow:0 0 20px #8866cc; }
  #header p { font-size:0.72em; color:#8877aa; margin-top:4px; letter-spacing:1px; }
  #header.hidden { opacity:0; }

  /* Constellation name label — appears above crosshair */
  #const-label {
    position:absolute; top:50%; left:50%;
    transform:translate(-50%, -80px);
    background:rgba(8,4,24,0.88); border:1px solid #5533aa;
    color:#e0d0ff; padding:7px 18px; border-radius:20px;
    font-size:0.95em; letter-spacing:1px;
    opacity:0; transition:opacity 0.3s; white-space:nowrap;
  }
  #const-label.visible { opacity:1; }

  /* Dwell ring — SVG circle that fills over 1.5s */
  #dwell-ring {
    position:absolute; top:50%; left:50%;
    transform:translate(-50%,-50%);
    width:60px; height:60px; pointer-events:none;
    opacity:0; transition:opacity 0.2s;
  }
  #dwell-ring.visible { opacity:1; }
  #dwell-track { fill:none; stroke:rgba(100,70,200,0.25); stroke-width:3; }
  #dwell-fill  { fill:none; stroke:#c8b8f8; stroke-width:3;
                 stroke-dasharray:157; stroke-dashoffset:157;
                 stroke-linecap:round; transform-origin:center;
                 transform:rotate(-90deg);
                 transition:stroke-dashoffset 0.05s linear; }

  /* Crosshair dot */
  #crosshair {
    position:absolute; top:50%; left:50%;
    transform:translate(-50%,-50%);
    width:6px; height:6px; border-radius:50%;
    background:#a898d8; opacity:0.7;
  }

  /* Hint text below crosshair */
  #hint {
    position:absolute; top:50%; left:50%;
    transform:translate(-50%, 26px);
    font-size:0.65em; color:#7755aa;
    opacity:0; transition:opacity 0.3s; white-space:nowrap;
  }
  #hint.visible { opacity:1; }

  /* Mythology panel */
  #info-panel {
    position:absolute; bottom:0; left:0; right:0;
    background:linear-gradient(transparent, rgba(5,2,15,0.98) 22%);
    padding:55px 28px 28px;
    transform:translateY(100%); transition:transform 0.4s ease;
    max-height:65vh; overflow-y:auto;
    pointer-events:none;
  }
  #info-panel.visible { transform:translateY(0); pointer-events:auto; }
  #info-name { font-size:1.5em; color:#e8d8ff; letter-spacing:2px; margin-bottom:5px; }
  #info-season { font-size:0.78em; color:#9977bb; margin-bottom:14px; font-style:italic; }
  #info-myth { font-size:0.88em; color:#ccc0ee; line-height:1.75; max-width:640px; }
  #close-btn {
    position:absolute; top:16px; right:20px;
    background:none; border:1px solid #5533aa;
    color:#c8b8f8; padding:8px 16px; cursor:pointer;
    font-family:Georgia,serif; font-size:0.85em; border-radius:4px;
    pointer-events:auto;
  }
  #close-btn:hover { background:rgba(80,40,160,0.4); }

  /* VR + location badges */
  #vr-btn {
    position:absolute; bottom:28px; right:28px;
    background:rgba(60,30,120,0.88); border:1px solid #7755bb;
    color:#e0d0ff; padding:11px 20px; cursor:pointer;
    font-family:Georgia,serif; font-size:0.95em; border-radius:6px;
    letter-spacing:1px; pointer-events:auto;
    box-shadow:0 0 18px rgba(120,80,200,0.3);
  }
  #vr-btn:hover { background:rgba(90,50,170,0.95); }

  #location-badge {
    position:absolute; top:18px; right:18px;
    font-size:0.63em; color:#443355; text-align:right; line-height:1.5;
  }

  /* Loading */
  #loading {
    position:absolute; inset:0; background:#00000f;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    transition:opacity 1s;
  }
  #loading.fade { opacity:0; pointer-events:none; }
  #loading h2 { color:#c8b8f8; font-size:1.4em; letter-spacing:4px; margin-bottom:12px; }
  #loading p { color:#776699; font-size:0.8em; }
  .dots { display:flex; gap:8px; margin-bottom:22px; }
  .dot { width:5px; height:5px; border-radius:50%; background:#c8b8f8; animation:twinkle 1.4s infinite; }
  .dot:nth-child(2){animation-delay:.25s}.dot:nth-child(3){animation-delay:.5s}
  .dot:nth-child(4){animation-delay:.75s}.dot:nth-child(5){animation-delay:1s}
  @keyframes twinkle{0%,100%{opacity:.1}50%{opacity:1}}
</style>
</head>

const CONST_DATA={"And":{"name":"Andromeda","ra":0.75,"dec":43,"lines":[[[30.9748,42.3297],[17.433,35.6206],[9.832,30.861],[2.0969,29.0904]],[[14.3017,23.4176],[11.8347,24.2672],[9.6389,29.3118],[9.832,30.861],[9.2202,33.7193],[-5.4658,43.2681],[-14.5197,42.326]],[[-5.4658,43.2681],[-4.8979,44.3339],[-5.609,46.4582]],[[17.433,35.6206],[14.1884,38.4993],[12.4535,41.0789],[17.3755,47.2418],[24.4982,48.6282]],[[-4.8979,44.3339],[-3.4915,46.4203]]],"myth":"Princess of Ethiopia, chained to a rock as sacrifice to the sea monster Cetus to appease the god Poseidon. Rescued by Perseus, who slew the monster and married her. She was placed among the stars by Athena after her death.","season":"Best seen in autumn"},"Ant":{"name":"Air\u2005Pump","ra":156,"dec":-36,"lines":[[[142.3113,-35.9513],[156.7879,-31.0678],[164.1794,-37.1378]]],"myth":"Named by French astronomer Nicolas-Louis de Lacaille in 1756 after the air pump invented by Robert Boyle. One of the few constellations with no mythological tradition \u2014 purely a tribute to science.","season":"Best seen in spring"},"Aps":{"name":"Bird\u2005of\u2005Paradise","ra":-120,"dec":-74,"lines":[[[-138.0345,-79.0448],[-114.9133,-78.6957],[-109.2306,-77.5174],[-111.6372,-78.8971]]],"myth":"The Bird of Paradise, named by Dutch navigators Pieter Dirkszoon Keyser and Frederick de Houtman in the 1590s. Represents the exotic birds brought back from New Guinea, prized for their spectacular plumage.","season":"Best seen in July"},"Aqr":{"name":"Aquarius","ra":-22.5,"dec":-5,"lines":[[[-48.081,-9.4958],[-46.8365,-8.9833],[-37.1103,-5.5712],[-28.554,-0.3199],[-24.5859,-1.3873],[-22.792,-0.02],[-21.1609,-0.1175],[-16.8464,-7.5796],[-10.5241,-9.1825],[-12.6383,-21.1724]],[[-37.1103,-5.5712],[-28.3907,-13.8697]],[[-28.554,-0.3199],[-25.7915,-7.7833]],[[-22.792,-0.02],[-23.6807,1.3774]],[[-9.2574,-20.1006],[-10.5241,-9.1825],[-4.5591,-17.8165]]],"myth":"The Water Bearer, one of the oldest constellations. In Babylonian mythology, associated with the god Ea, bringer of floods. In Greek myth, often identified as Ganymede, the beautiful youth abducted by Zeus to serve as cupbearer to the gods on Olympus.","season":"Best seen in autumn"},"Aql":{"name":"Eagle","ra":-69,"dec":8,"lines":[[[-63.4351,10.6133],[-62.3042,8.8683],[-61.1717,6.4068],[-57.1738,-0.8215],[-61.8818,1.0057],[-68.6254,3.1148],[-73.6475,13.8635],[-62.3042,8.8683],[-68.6254,3.1148],[-73.4378,-4.8826]]],"myth":"The Eagle of Zeus, sent by the king of the gods to carry thunderbolts. Also said to be the eagle that daily devoured the liver of Prometheus as punishment for stealing fire from the gods and giving it to humanity.","season":"Best seen in summer"},"Ara":{"name":"Altar","ra":-102,"dec":-56,"lines":[[[-98.6514,-56.3777],[-97.2254,-60.6838],[-107.5535,-59.0414],[-105.345,-55.9901],[-105.104,-53.1604],[-97.0396,-49.8761],[-98.675,-55.5299]]],"myth":"The Altar upon which the gods swore their oath of allegiance before the Titanomachy \u2014 the war between the Olympians and the Titans. Zeus used this altar to seal the pact with his brothers and sisters that would change the universe forever.","season":"Best seen in July"},"Ari":{"name":"Ram","ra":42,"dec":22,"lines":[[[42.496,27.2605],[31.7934,23.4624],[28.66,20.808],[28.3826,19.2939]]],"myth":"The Ram with the Golden Fleece, sent by the god Hermes to rescue the children Phrixus and Helle from their murderous stepmother. Helle fell into the sea (named the Hellespont), but Phrixus reached Colchis safely. He sacrificed the ram to Zeus and hung its fleece in a sacred grove, where it became the object of Jason and the Argonauts' legendary quest.","season":"Best seen in autumn"},"Aur":{"name":"Charioteer","ra":82.5,"dec":37,"lines":[[[89.8822,44.9474],[79.1723,45.998],[76.6287,41.2345],[74.2484,33.1661],[81.573,28.6075],[89.9303,37.2126],[89.8822,44.9474],[89.8818,54.2847],[79.1723,45.998],[75.4922,43.8233],[75.6195,41.0758]]],"myth":"The Charioteer, identified with Erichthonius, son of Hephaestus, who became king of Athens. Lame from birth, he invented the four-horse chariot so he could move with dignity. Zeus was so impressed he placed him among the stars.","season":"Best seen in winter"},"Boo":{"name":"Herdsman","ra":-136.5,"dec":35,"lines":[[[-153.1844,17.4569],[-151.3288,18.3977],[-146.0847,19.1824],[-142.0425,30.3714],[-141.9805,38.3083],[-134.5135,40.3906],[-131.1243,33.3148],[-138.7533,27.0742],[-146.0847,19.1824],[-139.7127,13.7283]],[[-141.9805,38.3083],[-145.9041,46.0883],[-146.6341,51.7879],[-143.7008,51.8507],[-145.9041,46.0883]]],"myth":"The Herdsman or Bear Driver, chasing the Great Bear (Ursa Major) around the pole. Some myths say he is Arcas, son of Zeus and Callisto, nearly killing his own mother before Zeus transformed them both into bears and placed them in the sky. Contains Arcturus, the fourth-brightest star in the night sky.","season":"Best seen in spring"},"Cae":{"name":"Graving\u2005tool","ra":73.5,"dec":-42,"lines":[[[67.7087,-44.9537],[70.1405,-41.8638],[70.5145,-37.1443],[76.1017,-35.483]]],"myth":"The Chisel or Sculptor's Chisel, another of Lacaille's southern constellations honoring the arts and sciences. A faint, small constellation with no mythological tradition.","season":"Best seen in December"},"Cam":{"name":"Giraffe","ra":84,"dec":72,"lines":[[[74.3217,53.7521],[75.8545,60.4422],[73.5125,66.3427],[57.5896,71.3323],[57.3803,65.526],[52.2672,59.9403]],[[73.5125,66.3427],[94.7116,69.3198],[105.0168,76.9774]]],"myth":"The Giraffe, introduced in 1612 by Dutch cartographer Petrus Plancius. He believed the tall animal in Genesis that carried Rebekah to Isaac was a camel-leopard \u2014 a giraffe. The name means \"camel-leopard\" in Greek.","season":"Best seen in winter"},"Cnc":{"name":"Crab","ra":128.25,"dec":27,"lines":[[[134.6218,11.8577],[131.1712,18.1543],[130.8214,21.4685],[131.6666,28.7651]],[[131.1712,18.1543],[124.1288,9.1855]]],"myth":"The Crab, sent by Hera to distract Heracles during his battle with the Lernaean Hydra. The crab pinched Heracles' foot but was crushed underfoot. Hera, honoring the loyal crab's service, placed it among the stars. The Sun passed through Cancer during the summer solstice in ancient times \u2014 hence the Tropic of Cancer.","season":"Best seen in spring"},"CVn":{"name":"Hunting\u2005Dogs","ra":-168,"dec":43,"lines":[[[-165.9981,38.3149],[-171.5644,41.3575]]],"myth":"The Hunting Dogs of Bo\u00f6tes, introduced by Johannes Hevelius in 1687. The two dogs, Asterion and Chara, strain at their leashes as they chase Ursa Major around the celestial pole. Home to the Whirlpool Galaxy (M51), one of the most beautiful galaxies visible in small telescopes.","season":"Best seen in spring"},"CMa":{"name":"Great\u2005Dog","ra":97.5,"dec":-26,"lines":[[[95.6749,-17.9559],[101.2872,-16.7161],[105.7561,-23.8333],[107.0979,-26.3932],[105.4298,-27.9348],[104.6565,-28.9721],[95.0783,-30.0634]],[[111.0238,-29.3031],[107.0979,-26.3932]],[[101.2872,-16.7161],[104.0343,-17.0542],[105.9396,-15.6333],[103.5475,-12.0386],[104.0343,-17.0542]]],"myth":"The Greater Dog, faithful companion of Orion the Hunter. Contains Sirius, the brightest star in the entire night sky. Ancient Egyptians called Sirius the \"Dog Star\" and noted that its annual rising at dawn marked the flooding of the Nile \u2014 the most important event of their agricultural year.","season":"Best seen in winter"},"CMi":{"name":"Little\u2005Dog","ra":109.5,"dec":5,"lines":[[[114.8255,5.225],[111.7877,8.2893]]],"myth":"The Lesser Dog, Orion's second hunting companion. Its brightest star, Procyon, rises just before Sirius \u2014 its name means \"before the dog.\" Like Canis Major, this constellation was deeply important to ancient agricultural peoples who tracked the stars to mark the seasons.","season":"Best seen in winter"},"Cap":{"name":"Capricorn","ra":-45,"dec":-22,"lines":[[[-55.588,-12.5082],[-54.7472,-14.7814],[-52.7849,-17.8137],[-48.4761,-25.2709],[-47.0446,-26.9191],[-38.3332,-22.4113],[-33.2398,-16.1273],[-34.9773,-16.6623],[-39.4383,-16.8345],[-43.5132,-17.2329],[-55.588,-12.5082]]],"myth":"The Sea Goat, one of the oldest constellations dating back at least 4,000 years. In Greek myth, identified with the god Pan, who transformed into a goat-fish to escape the monster Typhon. Zeus was so amused he placed him in the sky permanently.","season":"Best seen in autumn"},"Car":{"name":"Keel","ra":144,"dec":-66,"lines":[[[99.4403,-43.1959],[95.988,-52.6957],[138.2999,-69.7172],[153.4342,-70.0379],[160.7392,-64.3945],[158.0061,-61.6853],[154.2707,-61.3323],[139.2725,-59.2752],[125.6285,-59.5095],[119.1946,-52.9824],[122.3831,-47.3366],[131.1759,-54.7088],[139.2725,-59.2752]],[[160.7392,-64.3945],[166.6351,-62.4241],[167.1417,-61.9472],[168.1501,-60.3176],[167.1475,-58.975],[163.3736,-58.8532],[158.0061,-61.6853]]],"myth":"The Keel of the great ship Argo, sailed by Jason and the Argonauts in their quest for the Golden Fleece. Originally part of the massive constellation Argo Navis, broken into pieces by astronomer Nicolas-Louis de Lacaille in 1752. Contains Canopus, the second-brightest star in the night sky.","season":"Best seen in winter/spring"},"Cas":{"name":"Cassiopeia","ra":-6,"dec":55.5,"lines":[[[28.5989,63.6701],[21.454,60.2353],[14.1772,60.7167],[10.1268,56.5373],[2.2945,59.1498]]],"myth":"Queen of Ethiopia, wife of King Cepheus, mother of Andromeda. Her fatal flaw was vanity \u2014 she boasted she was more beautiful than the sea nymphs, the Nereids. Poseidon punished her kingdom with a sea monster, demanding Andromeda as sacrifice. After her death, she was placed in the sky but condemned to circle the pole, sometimes hanging upside down as eternal punishment for her pride.","season":"Visible year-round in northern latitudes"},"Cen":{"name":"Centaur","ra":-160.5,"dec":-40,"lines":[[[170.2517,-54.491],[-177.9104,-50.7224],[-172.9901,-50.2306],[-169.6207,-48.9599],[-155.0281,-53.4664],[-151.1151,-47.2884],[-152.5959,-42.4737],[-152.6238,-41.6877],[-148.3294,-36.37],[-141.1232,-42.1578],[-135.2096,-42.1042]],[[-152.6238,-41.6877],[-159.8508,-36.7123]],[[-140.1038,-60.8372],[-155.0281,-53.4664],[-149.0441,-60.373]],[[-172.9901,-50.2306],[-177.087,-52.3685],[172.942,-59.4421]]],"myth":"The Centaur, usually identified as Chiron, the wisest of all centaurs. Teacher of heroes including Achilles, Jason, and Asclepius (father of medicine). When accidentally wounded by a poisoned arrow and unable to die because he was immortal, Chiron voluntarily gave up his immortality to end his suffering. Zeus honored him with a place among the stars.","season":"Best seen in spring"},"Cep":{"name":"Cepheus","ra":-22.5,"dec":71,"lines":[[[-52.6046,62.9941],[-48.6776,61.8388],[-40.3551,62.5856],[-34.1231,58.78],[-26.2409,57.0436],[-27.2863,58.2013],[-22.7072,58.4152],[-17.5799,66.2004],[-5.1631,77.6323],[-37.835,70.5607],[-40.3551,62.5856]],[[-37.835,70.5607],[-17.5799,66.2004]]],"myth":"King of Ethiopia, husband of Cassiopeia, father of Andromeda. Placed in the stars along with his family after death. Contains Delta Cephei, the most famous variable star in astronomy \u2014 the Cepheid variables discovered through this star allowed astronomers to measure vast cosmic distances and prove the universe extends far beyond our galaxy.","season":"Visible year-round in northern latitudes"},"Cet":{"name":"Whale","ra":28.5,"dec":-5,"lines":[[[40.8252,3.2358],[38.9686,5.5932],[37.0398,8.4601],[41.2356,10.1141],[44.9288,8.9074],[45.5699,4.0897],[40.8252,3.2358],[39.8707,0.3285],[34.8366,-2.9776],[27.8651,-10.335],[26.017,-15.9375],[10.8974,-17.9866],[4.857,-8.8239],[17.1475,-10.1823],[21.0059,-8.1833],[27.8651,-10.335]]],"myth":"The Sea Monster sent by Poseidon to devour the chained princess Andromeda. Slain by Perseus, who used the severed head of Medusa to turn the beast to stone. Contains Mira, a remarkable variable star that swells and brightens dramatically, cycling from invisible to naked-eye in about 332 days.","season":"Best seen in autumn"},"Cha":{"name":"Chamaeleon","ra":-171,"dec":-81,"lines":[[[124.6315,-76.9197],[158.8671,-78.6078],[161.318,-80.4696],[-175.4132,-79.3122],[179.9066,-78.2218],[158.8671,-78.6078]]],"myth":"The Chameleon, introduced by Dutch navigators Keyser and de Houtman in the 1590s. Named for the color-changing lizard, it represents the exotic animals encountered during voyages of exploration to the southern hemisphere.","season":"Best seen in April"},"Cir":{"name":"Compass","ra":-142.5,"dec":-67,"lines":[[[-130.6215,-58.8012],[-139.3733,-64.9751],[-129.1556,-59.3208]]],"myth":"The Compass (drawing compass, not magnetic), one of Lacaille's scientific constellations from 1756. Represents the drafting tool used in geometry and cartography \u2014 a tribute to precision measurement.","season":"Best seen in June"},"Col":{"name":"Dove","ra":85.5,"dec":-39,"lines":[[[95.5285,-33.4364],[87.74,-35.7683],[84.9122,-34.0741],[82.8031,-35.4705]],[[87.74,-35.7683],[89.7867,-42.8151]]],"myth":"The Dove, possibly the dove Noah sent from the Ark to find dry land. Some astronomers associate it with the dove sent ahead of the Argo to test whether the Symplegades (Clashing Rocks) could be passed safely. The dove lost only its tail feathers; the Argonauts followed and escaped with just the stern damaged.","season":"Best seen in winter"},"Com":{"name":"Berenice's\u2005Hair","ra":-166.5,"dec":24,"lines":[[[-162.503,17.5294],[-162.0317,27.8782],[-173.2655,28.2684]]],"myth":"The Hair of Berenice. Queen Berenice II of Egypt vowed to sacrifice her beautiful golden hair to the gods if her husband returned safely from war. When he did, she kept her vow. The hair vanished from the temple \u2014 the court astronomer Conon declared the gods had placed it among the stars. One of the few constellations commemorating a real historical person.","season":"Best seen in spring"},"CrA":{"name":"Southern\u2005Crown","ra":-78,"dec":-40,"lines":[[[-75.3193,-37.1074],[-73.3954,-37.0634],[-72.6319,-37.9045],[-72.4927,-39.3408],[-72.9126,-40.4967],[-74.2213,-42.0951],[-77.6042,-43.4341],[-81.6242,-42.3125]]],"myth":"The Southern Crown, associated with the same tradition as the Northern Crown. Sometimes said to be the crown of the centaur Sagittarius, placed there as he fell. An ancient constellation recognized by the Greeks, Romans, and Babylonians.","season":"Best seen in summer"},"CrB":{"name":"Northern\u2005Crown","ra":-121.5,"dec":32,"lines":[[[-126.7676,31.3591],[-128.0428,29.1057],[-126.328,26.7147],[-124.3143,26.2956],[-122.6015,26.0684],[-120.6031,26.8779],[-119.6393,29.8511]]],"myth":"The Northern Crown, the wedding crown of Ariadne, daughter of King Minos of Crete. She helped the hero Theseus navigate the Labyrinth and defeat the Minotaur, giving him a thread to find his way back. Theseus later abandoned her, and the god Dionysus found her on the island of Naxos, fell in love with her, and placed her crown among the stars.","season":"Best seen in summer"},"Crv":{"name":"Crow","ra":-174,"dec":-19.5,"lines":[[[-177.8966,-24.7289],[-177.4688,-22.6198],[-176.0485,-17.5419],[-172.5339,-16.5154],[-171.4032,-23.3968],[-177.4688,-22.6198]]],"myth":"The Crow, sacred to Apollo. In one myth, Apollo sent the crow to fetch water. The crow stopped to wait for figs to ripen, then lied about why it was late. Apollo punished the crow by placing it in the sky, forever unable to reach the Cup (Crater) of water beside it.","season":"Best seen in spring"},"Crt":{"name":"Cup","ra":174.75,"dec":-15,"lines":[[[174.1705,-9.8022],[171.1525,-10.8593],[169.8352,-14.7785],[164.9436,-18.2988],[167.9145,-22.8258],[170.8412,-18.78],[171.2205,-17.684],[176.1907,-18.3507],[179.004,-17.1508]],[[169.8352,-14.7785],[171.2205,-17.684]]],"myth":"The Cup, Apollo's goblet that the crow was sent to fill when it instead waited by a fig tree. The cup, crow, and water serpent (Hydra) are all depicted together on the ecliptic \u2014 an ancient tableau of the crow's punishment.","season":"Best seen in spring"},"Cru":{"name":"Cross","ra":-166.5,"dec":-62,"lines":[[[-168.0697,-59.6888],[-176.2137,-58.7489]],[[-173.3504,-63.0991],[-172.2085,-57.1132]]],"myth":"The Southern Cross, the smallest constellation in the sky but one of the most famous. It has guided navigators of the southern hemisphere for millennia as the North Star guides northern travelers. First documented by Europeans in the 15th century, it appears on the flags of Australia, New Zealand, Brazil, and several other nations.","season":"Best seen in April/May"},"Cyg":{"name":"Swan","ra":-52.5,"dec":50,"lines":[[[-41.7659,30.2269],[-48.4472,33.9703],[-54.4429,40.2567],[-63.7563,45.1308],[-67.5735,51.7298],[-70.7243,53.3685]],[[-49.642,45.2803],[-54.4429,40.2567],[-60.9235,35.0834],[-67.3197,27.9597]]],"myth":"The Swan, most often identified with Zeus in disguise. To woo the mortal Leda, Zeus transformed into a beautiful swan \u2014 their union produced Helen of Troy and the twins Castor and Pollux. Sometimes identified with Orpheus, transformed into a swan after his death. Contains Deneb, one of the most luminous stars known, and Cygnus X-1, the first black hole candidate ever identified.","season":"Best seen in summer"},"Del":{"name":"Dolphin","ra":-51,"dec":6,"lines":[[[-51.6968,11.3033],[-50.6127,14.5951],[-50.0905,15.9121],[-48.3381,16.1241],[-49.1353,15.0746],[-50.6127,14.5951]]],"myth":"The Dolphin, messenger of Poseidon. The god of the sea sent dolphins to find the sea-nymph Amphitrite, whom he wished to marry. When a dolphin persuaded her to return and wed Poseidon, the grateful god placed the dolphin's image among the stars. Also associated with the dolphin who saved the musician Arion from drowning sailors.","season":"Best seen in summer"},"Dor":{"name":"Goldfish","ra":76.5,"dec":-64,"lines":[[[64.0066,-51.4866],[68.4991,-55.045],[83.4063,-62.4898],[86.1932,-65.7355],[88.5252,-63.0896],[83.4063,-62.4898],[76.3777,-57.4727],[68.4991,-55.045]]],"myth":"The Swordfish (or Goldfish), introduced by Dutch navigators in the 1590s. Contains the Large Magellanic Cloud \u2014 a satellite galaxy of the Milky Way, visible as a misty patch and named after explorer Ferdinand Magellan who noted it during his circumnavigation.","season":"Best seen in January"},"Dra":{"name":"Dragon","ra":-91.5,"dec":64,"lines":[[[-91.6178,56.8726],[-90.8485,51.4889],[-97.3918,52.3014],[-96.9332,55.173],[-91.6178,56.8726],[-71.8612,67.6615],[-84.8107,71.3378],[-102.8034,65.7147],[-114.0021,61.5142],[-119.5277,58.5653],[-128.7676,58.9661],[-148.9027,64.3759],[-171.6294,69.7882],[172.8509,69.3311]],[[-84.8107,71.3378],[-84.7359,72.7328]],[[-71.8612,67.6615],[-62.9569,70.2679]]],"myth":"The Dragon, one of the oldest constellations. Most often identified as the dragon Ladon who guarded the golden apples in the garden of the Hesperides \u2014 slain by Heracles as one of his twelve labors. Thuban, in Draco's tail, was the North Star 4,700 years ago when the Egyptian pyramids were built \u2014 the pyramid shafts may have been aligned to it.","season":"Visible year-round in northern latitudes"},"Equ":{"name":"Colt","ra":-39.75,"dec":11.5,"lines":[[[-41.044,5.2478],[-41.3799,10.007],[-42.4146,10.1316]]],"myth":"The Little Horse or Foal, one of the smallest constellations. Ancient Greeks associated it with Celeris, brother of the winged horse Pegasus, given to Castor by Mercury. An ancient constellation, but never a prominent part of mythology.","season":"Best seen in autumn"},"Eri":{"name":"Eridanus","ra":52.5,"dec":-18,"lines":[[[76.9624,-5.0864],[71.3756,-3.2547],[69.0798,-3.3525],[62.9664,-6.8376],[59.5074,-13.5085],[56.5356,-12.1016],[55.8121,-9.7634],[53.2327,-9.4583],[44.1069,-8.8981],[41.0306,-13.8587],[41.2758,-18.5726],[45.5979,-23.6245],[49.8792,-21.7579],[53.447,-21.6329],[56.712,-23.2497],[68.8877,-30.5623],[66.0092,-34.0168],[64.4736,-33.7983],[57.3635,-36.2003],[54.2737,-40.2745],[49.9819,-43.0698],[44.5653,-40.3047],[40.1668,-39.8554],[36.7463,-47.7038],[34.1274,-51.5122],[28.9895,-51.6089],[24.4285,-57.2368]]],"myth":"The River, the celestial representation of a great river \u2014 perhaps the Nile, the Euphrates, or the mythical river at the edge of the world. Associated with the story of Phaethon, son of the sun god Helios, who begged to drive the solar chariot. He lost control, scorching the earth, until Zeus struck him with a thunderbolt. He fell into the river Eridanus, where his sisters wept amber tears.","season":"Best seen in November"},"For":{"name":"Furnace","ra":40.5,"dec":-28,"lines":[[[48.0189,-28.9876],[42.2726,-32.4059],[31.1227,-29.2968]]],"myth":"The Furnace, one of Lacaille's scientific constellations honoring the chemical furnace used by scientist Antoine Lavoisier. Purely modern in origin with no mythological tradition.","season":"Best seen in November"},"Gem":{"name":"Twins","ra":107.25,"dec":23.5,"lines":[[[93.7194,22.5068],[95.7401,22.5136],[100.983,25.1311],[107.7849,30.2452],[113.6494,31.8883],[116.329,28.0262],[113.9806,26.8957],[110.0307,21.9823],[106.0272,20.5703],[99.4279,16.3993],[101.3224,12.8956]],[[110.0307,21.9823],[109.5232,16.5404]]],"myth":"The Twins, Castor and Pollux \u2014 sons of Queen Leda of Sparta. Castor was mortal (son of King Tyndareus), while Pollux was immortal (son of Zeus). They were inseparable in life. When Castor died in battle, Pollux begged Zeus to let him share his immortality. Zeus placed them together in the sky, where they shine side by side for eternity. Patron saints of sailors, they were said to appear as Saint Elmo's Fire on ships in storms.","season":"Best seen in winter"},"Gru":{"name":"Crane","ra":-18,"dec":-41.5,"lines":[[[-14.78,-52.7541],[-17.8613,-51.3169],[-19.3331,-46.8846],[-22.5607,-43.7492],[-27.9417,-46.961],[-19.3331,-46.8846]],[[-22.6826,-43.4956],[-26.0962,-41.3467],[-28.4713,-39.5434],[-31.5178,-37.3649]]],"myth":"The Crane, introduced by Dutch navigators in the 1590s. The crane was associated in ancient Egypt with the god Thoth, god of writing and wisdom. Some Eastern traditions associate it with longevity and good fortune.","season":"Best seen in autumn"},"Her":{"name":"Hercules","ra":-106.5,"dec":35,"lines":[[[-114.5199,19.1531],[-112.445,21.4896],[-109.6785,31.6027],[-109.276,38.9223],[-111.4742,42.437],[-115.0648,46.3134],[-117.8076,44.9349],[-121.8311,42.4515]],[[-109.6785,31.6027],[-104.9276,30.9264]],[[-109.276,38.9223],[-101.2382,36.8092]],[[-90.9367,37.2505],[-99.0794,37.1459],[-101.2382,36.8092],[-104.9276,30.9264],[-101.242,24.8392],[-93.3853,27.7207],[-90.5588,29.2479],[-88.1144,28.7625]],[[-101.3381,14.3903],[-112.445,21.4896]]],"myth":"The greatest hero of Greek mythology, son of Zeus and the mortal Alcmena. Famous for the Twelve Labors, including slaying the Nemean Lion, defeating the Lernaean Hydra, and capturing the three-headed dog Cerberus. After his death, Zeus placed him among the stars. Contains the Great Hercules Cluster (M13), one of the finest globular clusters visible in the northern sky \u2014 containing hundreds of thousands of ancient stars.","season":"Best seen in summer"},"Hor":{"name":"Clock","ra":51,"dec":-52,"lines":[[[63.5005,-42.2944],[40.6394,-50.8003],[39.3515,-52.5431],[40.1651,-54.5499],[45.9034,-59.7378],[44.6992,-64.0713]]],"myth":"The Pendulum Clock, one of Lacaille's constellations honoring the precision pendulum clock invented by Christiaan Huygens in 1656 \u2014 a revolutionary improvement in timekeeping that enabled accurate navigation.","season":"Best seen in November"},"Hya":{"name":"Sea\u2005Serpent","ra":150,"dec":-22,"lines":[[[131.6938,6.4188],[132.1082,5.8378],[130.8061,3.3987],[129.6893,3.3414],[129.414,5.7038],[131.6938,6.4188],[133.8484,5.9456],[138.5911,2.3143],[144.964,-1.1428],[141.8968,-8.6586],[147.8696,-14.8466],[152.647,-12.3541],[156.5226,-16.8363],[162.4062,-16.1936],[173.2505,-31.8576],[178.2272,-33.9081],[-160.2696,-23.1715],[-148.4071,-26.6824],[-137.4279,-27.9604]]],"myth":"The Water Serpent, the largest constellation in the sky by area, stretching across a quarter of the celestial equator. Identified with the Lernaean Hydra, the nine-headed monster slain by Heracles as his second labor. Every time a head was cut off, two more grew in its place \u2014 Heracles finally defeated it by burning the stumps, then buried the immortal central head under a boulder.","season":"Best seen in spring"},"Hyi":{"name":"Hydrus","ra":34.5,"dec":-72,"lines":[[[6.4378,-77.2542],[56.8098,-74.239],[39.8973,-68.2669],[35.4373,-68.6594],[28.7339,-67.6473],[29.6925,-61.5699]]],"myth":"The Water Snake, introduced by Dutch navigators in the 1590s. A southern counterpart to the great Hydra constellation. Located near the south celestial pole.","season":"Best seen in November"},"Ind":{"name":"Indian","ra":-42,"dec":-55.5,"lines":[[[-50.6082,-47.2915],[-48.9903,-51.921],[-46.2975,-58.4542],[-30.5205,-54.9926],[-40.0334,-53.4494],[-50.6082,-47.2915]]],"myth":"The Indian (Native American or East Indian), introduced by Dutch navigators. Represents an indigenous person of the Americas encountered during voyages of exploration.","season":"Best seen in autumn"},"Lac":{"name":"Lizard","ra":-18,"dec":47,"lines":[[[-24.1099,52.229],[-22.1771,50.2825],[-22.6174,47.7069],[-24.7436,46.5366],[-22.3781,43.1234],[-19.8714,44.2763],[-22.6174,47.7069],[-23.8709,49.4764],[-24.1099,52.229]],[[-22.3781,43.1234],[-26.5303,39.7149],[-26.0076,37.7487]]],"myth":"The Lizard, introduced by Johannes Hevelius in 1687. He filled the gap between Cygnus and Andromeda with this small constellation, choosing a lizard to fit the cramped space. No mythological tradition.","season":"Best seen in autumn"},"Leo":{"name":"Lion","ra":159,"dec":15,"lines":[[[152.093,11.9672],[151.8331,16.7627],[154.9931,19.8415],[168.5271,20.5237],[177.2649,14.5721],[168.56,15.4296],[152.093,11.9672]],[[154.9931,19.8415],[154.1726,23.4173],[148.1909,26.007],[146.4628,23.7743]]],"myth":"The Nemean Lion, slain by Heracles as his first labor. The beast was impervious to weapons; Heracles strangled it with his bare hands and wore its invincible skin as armor ever after. An ancient constellation recognized by Babylonians as early as 4,000 BCE. The Sphinx may have been built with the head of a lion, and the Great Sphinx could have originally faced Leo during its constellation's heliacal rising around 10,500 BCE.","season":"Best seen in spring"},"LMi":{"name":"Little\u2005Lion","ra":157.5,"dec":30,"lines":[[[151.8573,35.2447],[156.4784,33.7961],[163.3279,34.2149],[156.9708,36.7072],[151.8573,35.2447],[143.5558,36.3976]]],"myth":"The Little Lion, introduced by Johannes Hevelius in 1687. A small constellation between Leo and Ursa Major with no mythological tradition.","season":"Best seen in spring"},"Lep":{"name":"Hare","ra":88.5,"dec":-25,"lines":[[[91.5388,-14.9353],[89.1012,-14.1677],[86.7389,-14.822],[83.1826,-17.8223],[78.2329,-16.2055],[76.3653,-22.371],[82.0613,-20.7594],[86.1158,-22.4484],[87.8304,-20.8791]],[[78.3078,-12.9413],[78.2329,-16.2055],[79.8939,-13.1768]]],"myth":"The Hare, crouching at the feet of Orion the Hunter. In some traditions the hare is hunted by Orion's dogs, Canis Major and Canis Minor. Ancient Egyptians associated the hare with their goddess Wenet. The hare was also associated with the Moon in many cultures worldwide.","season":"Best seen in winter"},"Lib":{"name":"Balance","ra":-129,"dec":-26,"lines":[[[-133.9824,-25.282],[-137.2804,-16.0418],[-130.7483,-9.3829],[-126.1184,-14.7895],[-125.744,-28.1351],[-125.336,-29.7778]],[[-137.2804,-16.0418],[-126.1184,-14.7895]]],"myth":"The Scales of Justice, held by Virgo (the goddess Astraea or Themis). The only zodiac constellation representing an inanimate object. In ancient Rome, the Moon was in Libra during the legendary founding of Rome, making it especially sacred. The scales were used to weigh souls in Egyptian mythology.","season":"Best seen in spring"},"Lup":{"name":"Wolf","ra":-131.25,"dec":-35,"lines":[[[-122.2603,-33.6272],[-125.0584,-34.4119],[-129.5485,-36.2614],[-129.657,-40.6475],[-135.367,-43.134],[-139.5177,-47.3882],[-131.9288,-52.0992],[-130.3666,-47.8753],[-129.3297,-44.6896],[-126.2148,-41.1668],[-119.9695,-38.3967],[-118.3519,-36.8023]],[[-129.657,-40.6475],[-126.2148,-41.1668]]],"myth":"The Wolf, an ancient constellation but with disputed mythological identity. Ancient Greeks called it Therion (the beast), imagining it impaled on the spear of nearby Centaurus. The centaur may be bringing it as a sacrifice on the altar (Ara). In some traditions it represents a werewolf.","season":"Best seen in summer"},"Lyn":{"name":"Lynx","ra":121.5,"dec":49,"lines":[[[94.9058,59.011],[104.3192,58.4228],[111.6785,49.2115],[125.7088,43.1881],[135.1599,41.7829],[139.711,36.8026],[140.2638,34.3926]]],"myth":"The Lynx, introduced by Johannes Hevelius in 1687. He named it for the lynx because one needs lynx-sharp eyes to see this faint constellation's few dim stars. A practical name with no mythological tradition.","season":"Best seen in winter"},"Lyr":{"name":"Lyre","ra":-81,"dec":30,"lines":[[[-78.8068,37.6051],[-78.9051,39.6127],[-80.7653,38.7837],[-78.8068,37.6051],[-76.3738,36.8986],[-75.2641,32.6896],[-77.48,33.3627],[-78.8068,37.6051]]],"myth":"The Lyre of Orpheus, greatest musician who ever lived. His music could charm wild beasts, move stones, and make rivers change course. When his beloved Eurydice died, his music convinced Hades himself to release her \u2014 but Orpheus looked back too soon, losing her forever. After his own death, Zeus placed his lyre among the stars. Contains Vega, the fifth-brightest star in the sky and the former North Star 14,000 years ago. Also contains the Ring Nebula, the glowing shell of a dying star.","season":"Best seen in summer"},"Men":{"name":"Mensa","ra":82.5,"dec":-80,"lines":[[[92.5603,-74.753],[82.9709,-76.341],[73.7967,-74.9369],[75.6792,-71.3143]]],"myth":"Table Mountain, named by Lacaille after Table Mountain near Cape Town, South Africa, where he made his observations of the southern sky. The only constellation named after a terrestrial landmark. No mythological tradition.","season":"Best seen in January"},"Mic":{"name":"Microscope","ra":-43.5,"dec":-37,"lines":[[[-47.508,-33.7797],[-47.8786,-43.9885],[-39.8098,-40.8095],[-40.5155,-32.1725],[-44.6772,-32.2578],[-47.508,-33.7797]]],"myth":"The Microscope, one of Lacaille's scientific constellations honoring the compound microscope, invented in the early 17th century by Zacharias Janssen. A tribute to the instrument that revealed the invisible world.","season":"Best seen in autumn"},"Mon":{"name":"Unicorn","ra":114.75,"dec":-6,"lines":[[[115.3118,-9.5511],[122.1485,-2.9838],[107.9661,-0.4928],[97.2045,-7.0331],[93.7139,-6.2748]],[[107.9661,-0.4928],[101.9652,2.4122],[95.942,4.5929],[98.2259,7.333],[100.2444,9.8958]]],"myth":"The Unicorn, introduced in 1612 by Petrus Plancius. The unicorn appears in ancient Persian, Indian, and Chinese traditions as a symbol of purity and grace. Some historians believe the unicorn legend began with misidentified oryx antelopes seen in profile.","season":"Best seen in winter"},"Mus":{"name":"Fly","ra":-165,"dec":-73,"lines":[[[176.4017,-66.7288],[-175.6072,-67.9607],[-170.7041,-69.1356],[-168.43,-68.1081],[-164.4322,-71.5489],[-171.8833,-72.133],[-170.7041,-69.1356]]],"myth":"The Fly, introduced by Dutch navigators in the 1590s. Originally called Apis (the Bee) by Johann Bayer in 1603; it was renamed Musca by Lacaille. Near the Southern Cross, used for navigation in the southern hemisphere.","season":"Best seen in April/May"},"Nor":{"name":"Level","ra":-117,"dec":-52,"lines":[[[-118.3773,-45.1732],[-113.204,-47.5548],[-115.0399,-50.1555],[-119.1963,-49.2297],[-118.3773,-45.1732]]],"myth":"The Carpenter's Square, one of Lacaille's scientific constellations. Represents the set square used in carpentry and engineering \u2014 a tribute to precision craftsmanship.","season":"Best seen in June"},"Oct":{"name":"Octant","ra":-60,"dec":-80,"lines":[[[-143.2699,-83.6679],[-18.4854,-81.3816],[-34.6306,-77.39],[-143.2699,-83.6679]]],"myth":"The Octant (navigation instrument), introduced by Lacaille to honor the octant invented by John Hadley in 1730 \u2014 an early navigational instrument that preceded the sextant. Contains the south celestial pole, but has no bright pole star equivalent to Polaris.","season":"Circumpolar at south pole"},"Oph":{"name":"Ophiuchus","ra":-102,"dec":3,"lines":[[[-90.2434,-9.7736],[-93.0268,2.7073],[-94.1319,4.5673],[-96.2664,12.56],[-105.5829,9.375],[-112.2716,1.9839],[-116.4136,-3.6943],[-115.4196,-4.6925],[-110.7103,-10.5671],[-102.4055,-15.7249]],[[-105.5829,9.375],[-110.7103,-10.5671],[-112.2151,-16.6127],[-113.244,-18.4563],[-113.9742,-20.0373],[-113.6037,-23.4472]],[[-94.1319,4.5673],[-102.4055,-15.7249],[-99.4976,-24.9995],[-98.1614,-29.867]]],"myth":"The Serpent Bearer, most often identified as Asclepius, god of medicine, taught healing by the centaur Chiron. He grew so skilled he could raise the dead \u2014 threatening the natural order. Zeus struck him with a thunderbolt but honored his gifts by placing him in the stars. The rod with a snake wrapped around it (not the caduceus) remains the symbol of medicine today. The Sun actually passes through Ophiuchus \u2014 making it arguably a 13th zodiac constellation the ancient Babylonians chose to exclude.","season":"Best seen in summer"},"Ori":{"name":"Orion","ra":84,"dec":13,"lines":[[[91.893,14.7685],[88.5958,20.2762],[90.9799,20.1385],[92.985,14.2088],[90.5958,9.6473],[88.7929,7.4071],[81.2828,6.3497],[73.7239,10.1508]],[[74.6371,1.714],[73.5629,2.4407],[72.8015,5.6051],[72.46,6.9613],[72.653,8.9002],[73.7239,10.1508],[74.0928,13.5145],[76.1423,15.4041],[77.4248,15.5972]],[[78.6345,-8.2016],[81.1192,-2.3971],[83.0017,-0.2991],[81.2828,6.3497],[83.7845,9.9342],[88.7929,7.4071],[85.1897,-1.9426],[86.9391,-9.6696]],[[85.1897,-1.9426],[84.0534,-1.2019],[83.0017,-0.2991]]],"myth":"The great Hunter, son of Poseidon, giant of terrible beauty. Different myths explain his death differently \u2014 killed by a scorpion (which is why Scorpius and Orion are never in the sky together), by Artemis who loved him, or by Gaia who feared his boast that he would hunt all creatures on Earth. His three belt stars have guided humanity since prehistory. The Pyramids of Giza may align with Orion's belt. Contains the Orion Nebula (M42), one of the closest stellar nurseries to Earth \u2014 visible to the naked eye as a fuzzy star in Orion's sword.","season":"Best seen in winter"},"Pav":{"name":"Peacock","ra":-63,"dec":-62,"lines":[[[-53.5881,-56.7351],[-48.7604,-66.2032],[-57.8183,-66.1821],[-76.9457,-62.1876],[-84.1932,-61.4939],[-87.8549,-63.6686],[-93.5667,-64.7239],[-79.2411,-71.4281],[-59.8519,-72.9105],[-48.7604,-66.2032],[-38.3891,-65.3662]]],"myth":"The Peacock, sacred to the goddess Hera. When Hera set the hundred-eyed giant Argus to watch over Io (whom Zeus had transformed into a cow), Zeus sent Hermes to kill Argus. Hera memorialized Argus by placing his hundred eyes in the peacock's tail \u2014 each eye a reminder of her faithful watchman.","season":"Best seen in August"},"Peg":{"name":"Pegasus","ra":-25.5,"dec":16,"lines":[[[-27.5031,33.1782],[-19.2494,30.2212],[-14.0564,28.0828],[2.0969,29.0904],[3.309,15.1836],[-13.8098,15.2053],[-18.3267,12.1729],[-19.6345,10.8314],[-27.4501,6.1979],[-33.9535,9.875]],[[-13.8098,15.2053],[-14.0564,28.0828],[-17.4992,24.6016],[-18.3672,23.5657],[-28.2472,25.3451],[-33.8386,25.645]]],"myth":"The Winged Horse, born from the blood of Medusa when Perseus beheaded her. Captured by the hero Bellerophon using a golden bridle given by Athena, Pegasus helped him slay the Chimera. When Bellerophon grew too proud and tried to fly to Mount Olympus, Zeus sent a gadfly to sting Pegasus, sending Bellerophon falling to earth. Pegasus continued to Olympus where he carried Zeus's thunderbolts.","season":"Best seen in autumn"},"Per":{"name":"Perseus","ra":66,"dec":45,"lines":[[[56.0797,32.2882],[58.533,31.8836],[59.7413,35.791],[59.4635,40.0102],[56.2985,42.5785],[55.7313,47.7876],[54.1224,48.1926],[51.0807,49.8612],[46.1991,53.5064],[42.6742,55.8955],[43.5644,52.7625],[47.2667,49.6133],[47.374,44.8575],[47.0422,40.9556],[47.8224,39.6116],[46.2941,38.8403],[44.6903,39.6627],[44.9162,41.0329],[47.0422,40.9556]],[[61.646,50.3513],[63.7244,48.4093],[62.1654,47.7125],[55.7313,47.7876]],[[47.2667,49.6133],[41.0499,49.2284],[25.9152,50.6887]]],"myth":"Son of Zeus and Dana\u00eb, one of the greatest Greek heroes. Tasked with slaying the Gorgon Medusa \u2014 whose gaze turned all who looked upon her to stone. With winged sandals, an invisible cap, and a mirrored shield from the gods, Perseus beheaded Medusa without looking directly at her. He rescued Andromeda from the sea monster Cetus and returned home with the legendary head. Contains Algol, the Demon Star \u2014 a binary star system that dims regularly as one star eclipses the other, known to variability-watchers for thousands of years.","season":"Best seen in autumn/winter"},"Phe":{"name":"Phoenix","ra":16.5,"dec":-43,"lines":[[[6.571,-42.306],[16.521,-46.7184],[22.0914,-43.3182],[22.8129,-49.0727],[17.0962,-55.2458],[16.521,-46.7184],[2.3527,-45.7474],[6.571,-42.306]]],"myth":"The Phoenix, the immortal bird of fire that dies in flames and is reborn from its own ashes. Found in Egyptian, Greek, Arabian, and Chinese mythology as a symbol of resurrection and renewal. Said to live for 500 years before immolating itself, then rising again young and beautiful.","season":"Best seen in autumn"},"Pic":{"name":"Painter","ra":82.5,"dec":-50,"lines":[[[102.0477,-61.9414],[87.4569,-56.1667],[86.8212,-51.0665]]],"myth":"The Painter's Easel, one of Lacaille's constellations honoring the visual arts. Contains Beta Pictoris, a young star surrounded by a visible disk of dust and debris \u2014 one of the first and most studied protoplanetary disks, offering a glimpse of what our own solar system may have looked like billions of years ago.","season":"Best seen in January"},"Psc":{"name":"Fishes","ra":19.5,"de he sails).","season":"Best seen in winter"},"Pyx":{"name":"Compass","ra":132,"dec":-24,"lines":[[[120.896,-40.0031],[130.0256,-35.3084],[130.8981,-33.1864],[132.633,-27.7098]]],"myth":"The Compass (mariner's compass), one of Lacaille's scientific constellations. Though it looks like it should be part of the Argo's equipment, Lacaille placed it near but separate from Argo Navis, honoring the magnetic compass as a standalone achievement in navigation.","season":"Best seen in winter/spring"},"Ret":{"name":"Net","ra":55.5,"dec":-61,"lines":[[[63.6062,-62.4739],[64.121,-59.3022],[59.6865,-61.4002],[56.0499,-64.8069],[63.6062,-62.4739]]],"myth":"The Reticle (crosshairs of a telescope eyepiece), introduced by Lacaille. The reticle helped astronomers make precise measurements of star positions. A purely scientific constellation with no mythological tradition.","season":"Best seen in November"},"Sge":{"name":"Arrow","ra":-69,"dec":18,"lines":[[[-64.9759,18.0139],[-63.1531,18.5343],[-60.3107,19.4921]],[[-64.7378,17.476],[-63.1531,18.5343]]],"myth":"The Arrow, one of the tiniest constellations. Variously identified as the arrow Apollo used to kill the Cyclopes in revenge for Zeus striking down Asclepius, or the arrow of Eros that pierced Zeus's heart, or the arrow that killed the eagle of Aquila. An ancient constellation recognized by the Greeks, a simple but elegant celestial object.","season":"Best seen in summer"},"Sgr":{"name":"Archer","ra":-67.5,"dec":-34,"lines":[[[-85.5932,-36.7617],[-83.957,-34.3846],[-84.7515,-29.8281],[-83.0073,-25.4217],[-86.5591,-21.0588]],[[-69.3404,-44.459],[-69.0284,-40.6159],[-74.347,-29.8801],[-78.5859,-26.9908],[-83.0073,-25.4217]],[[-61.1846,-41.8683],[-60.0659,-35.2763],[-61.0402,-26.2995],[-65.8232,-24.8836],[-68.6813,-24.5086],[-71.1149,-25.2567],[-76.1836,-26.2967],[-78.5859,-26.9908],[-84.7515,-29.8281],[-88.548,-30.4241],[-83.957,-34.3846],[-74.347,-29.8801],[-73.265,-27.6704],[-76.1836,-26.2967],[-73.8292,-21.7415],[-72.559,-21.0236], Hyades star cluster, and the Crab Nebula \u2014 the expanding debris cloud of a supernova seen in 1054 CE, recorded by Chinese and Arab astronomers.","season":"Best seen in winter"},"Tel":{"name":"Telescope","ra":-82.5,"dec":-54,"lines":[[[-87.1927,-45.9544],[-83.2566,-45.9685],[-82.7923,-49.0706]]],"myth":"The Telescope, one of Lacaille's constellations honoring the scientific instruments of the Enlightenment. Represents the optical telescope \u2014 the instrument that more than any other transformed humanity's understanding of the cosmos, from Galileo's first observations in 1609 to the modern giants of today.","season":"Best seen in summer"},"Tri":{"name":"Triangle","ra":27,"dec":34,"lines":[[[28.2704,29.5788],[32.3859,34.9873],[34.3286,33.8472],[28.2704,29.5788]]],"myth":"The Triangle, an ancient constellation representing the Greek letter Delta or the island of Sicily (triangular in shape). Contains the Triangulum Galaxy (M33), the third-largest galaxy in the Local Group after the Milky Way and Andromeda \u2014 just barely visible to the naked eye under perfect dark skies.","season":"Best seen in autumn"},"TrA":{"name":"Southern\u2005Triangle","ra":-120,"dec":-67.5,"lines":[[[-107.8338,-69.0277],[-121.2143,-63.4307],[-130.2726,-68.6795],[-107.8338,-69.0277]]],"myth":"The Southern Triangle, introduced by Dutch navigators in the 1590s. One of the most distinctive constellations of the southern sky \u2014 its three bright stars form a clear, compact triangle visible to southern hemisphere observers.","season":"Best seen in June"},"Tuc":{"name":"Toucan","ra":-12,"dec":-64,"lines":[[[-25.3746,-60.2596],[-10.6426,-58.2357],[7.8861,-62.9582],[5.0178,-64.8748],[-0.0209,-65.5771],[-23.1668,-64.9664],[-25.3746,-60.2596]]],"myth":"The Toucan, introduced by Dutch navigators to represent the exotic birds of the New World. Contains the Small Magellanic Cloud \u2014 the smaller of the two satellite galaxies of the Milky Way named after Ferdinand Magellan. Also contains 47 Tucanae, one of the most spectacular globular clusters in the sky.","season":"Best seen in October"},"UMa":{"name":"Big\u2005Dipper","ra":165,"dec":48,"lines":[[[-176.1435,57.0326],[165.932,61.751],[165.4603,56.3824],[178.4577,53.6948],[-176.1435,57.0326],[-166.4927,55.9598],[-159.0186,54.9254],[-153.1148,49.3133]],[[178.4577,53.6948],[176.5126,47.7794],[169.6197,33.0943],[169.5468,31.5308]],[[176.5126,47.7794],[167.4159,44.4985],[155.5823,41.4995]],[[167.4159,44.4985],[154.2741,42.9144]],[[165.932,61.751],[142.8821,63.0619],[127.5661,60.7182],[147.7473,59.0387],[165.4603,56.3824]],[[165.4603,56.3824],[148.0265,54.0643],[143.2143,51.6773],[134.8019,48.0418]],[[135.9064,47.1565],[143.2143,51.6773]]],"myth":"The Great Bear, one of the most ancient and universal constellations. Contains the Big Dipper (or Plough), humanity's most universally recognized star pattern. In Greek myth, Zeus transformed the nymph Callisto into a bear to hide her from Hera \u2014 then Hera tricked her son Arcas into nearly killing his own mother before Zeus intervened, placing them both in the sky. The two stars of the Dipper's outer bowl point directly to Polaris, the North Star \u2014 a navigational trick used by sailors, travelers, and wanderers for millennia.","season":"Visible year-round in northern latitudes"},"UMi":{"name":"Little\u2005Dipper","ra":-133.5,"dec":68,"lines":[[[-123.9853,77.7945],[-115.6238,75.7553],[-129.8179,71.834],[-137.3236,74.1555],[-123.9853,77.7945],[-108.5073,82.0373],[-96.9458,86.5865],[37.9545,89.2641]]],"myth":"The Little Bear, containing Polaris, the North Star \u2014 within 1 degree of the celestial north pole. It has guided travelers and sailors for thousands of years. In Greek myth, this is Arcas, son of Callisto, placed in the sky by Zeus alongside his transformed mother. Polaris sits at the tip of the Little Bear's tail (or the end of the Little Dipper's handle).","season":"Visible year-round in northern latitudes"},"Vel":{"name":"Sails","ra":143.25,"dec":- // ── Astronomy ──────────────────────────────────────
function toRad(d){return d*Math.PI/180;}
function toDeg(r){return r*180/Math.PI;}
function julianDate(date){return date.getTime()/86400000+2440587.5;}
function lstDeg(date,lon){
  const jd=julianDate(date),T=(jd-2451545)/36525;
  let g=280.46061837+360.98564736629*(jd-2451545)+0.000387933*T*T-T*T*T/38710000;
  return((g+lon)%360+360)%360;
}
function raDecToAltAz(ra_h,dec_d,date){
  const ha=toRad(((lstDeg(date,LON)-ra_h*15)+360)%360);
  const decR=toRad(dec_d),latR=toRad(LAT);
  const sinAlt=Math.sin(decR)*Math.sin(latR)+Math.cos(decR)*Math.cos(latR)*Math.cos(ha);
  const alt=Math.asin(Math.max(-1,Math.min(1,sinAlt)));
  const cosAz=(Math.sin(decR)-Math.sin(alt)*Math.sin(latR))/(Math.cos(alt)*Math.cos(latR));
  let az=Math.acos(Math.max(-1,Math.min(1,cosAz)));
  if(Math.sin(ha)>0) az=2*Math.PI-az;
  return{alt:toDeg(alt),az:toDeg(az)};
}
function toXYZ(alt_d,az_d,r){
  const a=toRad(alt_d),z=toRad(az_d);
  return new THREE.Vector3(r*Math.cos(a)*Math.sin(z),r*Math.sin(a),-r*Math.cos(a)*Math.cos(z));
}
function starColor(ci){
  if(ci<-0.2) return new THREE.Color(0.75,0.85,1.0);
  if(ci<0.2)  return new THREE.Color(1.0,1.0,1.0);
  if(ci<0.6)  return new THREE.Color(1.0,0.98,0.82);
  if(ci<1.0)  return new THREE.Color(1.0,0.82,0.55);
  return new THREE.Color(1.0,0.6,0.38);
}

const canvas=document.getElementById("canvas");

renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.xr.enabled=true;

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x00000a);
const camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,2000);

// ── Stars ─────────────────────────────────────────
const now=new Date();
const sPos=[],sCol=[],sSz=[];
STAR_DATA.forEach(s=>{
  const{alt,az}=raDecToAltAz(s.ra,s.dec,now);
  const p=toXYZ(alt,az,RADIUS);
  sPos.push(p.x,p.y,p.z);
  const c=starColor(s.ci);
  sCol.push(c.r,c.g,c.b);
  sSz.push(Math.max(1.5,Math.min(8,(6-s.mag)*1.2)));
});
const starGeo=new THREE.BufferGeometry();
starGeo.setAttribute("position",new THREE.Float32BufferAttribute(sPos,3));
starGeo.setAttribute("color",new THREE.Float32BufferAttribute(sCol,3));
const szAttr=new THREE.Float32BufferAttribute(new Float32Array(sSz),1);
starGeo.setAttribute("size",szAttr);
const baseSizes=new Float32Array(sSz);

const starMat=new THREE.ShaderMaterial({
  uniforms:{px:{value:renderer.getPixelRatio()}},
  vertexShader:`
    attribute float size; attribute vec3 color; varying vec3 vColor; uniform float px;
    void main(){vColor=color;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);gl_PointSize=size*px;}
  `,
  fragmentShader:`
    varying vec3 vColor;
    void main(){
      vec2 uv=gl_PointCoord-0.5; float d=length(uv); if(d>0.5)discard;
      float core=1.0-smoothstep(0.0,0.25,d);
      float glow=1.0-smoothstep(0.25,0.5,d);
      gl_FragColor=vec4(vColor+core*0.4, core+glow*0.6);
    }
  `,
  transparent:true,vertexColors:true,depthWrite:false,blending:THREE.AdditiveBlending
});
scene.add(new THREE.Points(starGeo,starMat));

// ── Milky Way haze ────────────────────────────────
(function(){
  const p=[],c=[],s=[];
  for(let i=0;i<2500;i++){
    const ra=Math.random()*24;
    const dec=(Math.random()-0.5)*20*(Math.random()<0.7?1:3)-5*Math.sin(toRad(ra*15-280));
    const{alt,az}=raDecToAltAz(ra,dec,now);
    const v=toXYZ(alt,az,RADIUS*0.96);
    p.push(v.x,v.y,v.z);
    const b=0.06+Math.random()*0.1;
    c.push(b+0.01,b,b+0.03);
    s.push(1.0+Math.random()*1.5);
  }
  const g=new THREE.BufferGeometry();
  g.setAttribute("position",new THREE.Float32BufferAttribute(p,3));
  g.setAttribute("color",new THREE.Float32BufferAttribute(c,3));
  g.setAttribute("size",new THREE.Float32BufferAttribute(new Float32Array(s),1));
  const m=new THREE.ShaderMaterial({
    uniforms:{px:{value:renderer.getPixelRatio()}},
    vertexShader:`attribute float size;attribute vec3 color;varying vec3 vColor;uniform float px;void main(){vColor=color;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);gl_PointSize=size*px;}`,
    fragmentShader:`varying vec3 vColor;void main(){vec2 uv=gl_PointCoord-0.5;float d=length(uv);if(d>0.5)discard;gl_FragColor=vec4(vColor,0.5*(1.0-d*2.0));}`,
    transparent:true,vertexColors:true,depthWrite:false,blending:THREE.AdditiveBlending
  });
  scene.add(new THREE.Points(g,m));
})();

// ── Constellation Lines + Hit Meshes ──────────────
const constCenters=[];
Object.entries(CONST_DATA).forEach(([id,data])=>{
  const lp=[];
  data.lines.forEach(seg=>{
    for(let i=0;i<seg.length-1;i++){
      const[r1,d1]=seg[i],[r2,d2]=seg[i+1];
      const a1=raDecToAltAz(r1/15,d1,now),a2=raDecToAltAz(r2/15,d2,now);
      const p1=toXYZ(a1.alt,a1.az,RADIUS*0.99),p2=toXYZ(a2.alt,a2.az,RADIUS*0.99);
      lp.push(p1.x,p1.y,p1.z,p2.x,p2.y,p2.z);
    }
  });
  if(!lp.length)return;
  const geo=new THREE.BufferGeometry();
  geo.setAttribute("position",new THREE.Float32BufferAttribute(lp,3));
  const mat=new THREE.LineBasicMaterial({color:0x2211aa,transparent:true,opacity:0.4,depthWrite:false});
  const lines=new THREE.LineSegments(geo,mat);
  scene.add(lines);

  const ca=raDecToAltAz(data.ra/15,data.dec,now);
  const cp=toXYZ(ca.alt,ca.az,RADIUS*0.98);
  const hm=new THREE.Mesh(new THREE.SphereGeometry(50,8,8),new THREE.MeshBasicMaterial({visible:false}));
  hm.position.copy(cp);
  hm.userData={id,name:data.name,myth:data.myth,season:data.season,lines};
  scene.add(hm);
  constCenters.push({id,name:data.name,myth:data.myth,season:data.season,pos:cp,lines,hitMesh:hm});
});

// Ground
const gnd=new THREE.Mesh(new THREE.CircleGeometry(RADIUS*1.1,64),new THREE.MeshBasicMaterial({color:0x000811}));
gnd.rotation.x=-Math.PI/2; gnd.position.y=-2; scene.add(gnd);

// ── Gaze + Dwell System ───────────────────────────
const raycaster=new THREE.Raycaster();
raycaster.far=RADIUS*2;
const hitMeshes=constCenters.map(c=>c.hitMesh);
let hoveredId=null, panelOpen=false;
let dwellStart=null, dwellActive=false;
const DWELL_MS=1500; // 1.5 seconds gaze to auto-open

const dwellFill=document.getElementById("dwell-fill");
const dwellRing=document.getElementById("dwell-ring");
const constLabel=document.getElementById("const-label");
const hintEl=document.getElementById("hint");

function setHovered(d){
  if(panelOpen) return;
  if(hoveredId===d.id) return;
  hoveredId=d.id;
  constCenters.forEach(c=>{
    const on=c.id===d.id;
    c.lines.material.color.setHex(on?0x8866ff:0x2211aa);
    c.lines.material.opacity=on?0.85:0.4;
  });
  constLabel.textContent=d.name;
  constLabel.classList.add("visible");
  hintEl.classList.add("visible");
  // Start dwell timer
  dwellStart=performance.now();
  dwellActive=true;
  dwellRing.classList.add("visible");
}

function clearHovered(){
  if(!hoveredId) return;
  hoveredId=null;
  constCenters.forEach(c=>{c.lines.material.color.setHex(0x2211aa);c.lines.material.opacity=0.4;});
  constLabel.classList.remove("visible");
  hintEl.classList.remove("visible");
  dwellStart=null; dwellActive=false;
  dwellFill.style.strokeDashoffset="157";
  dwellRing.classList.remove("visible");
}

function checkGaze(){
  if(panelOpen) return;
  raycaster.setFromCamera(new THREE.Vector2(0,0),camera);
  const hits=raycaster.intersectObjects(hitMeshes);
  if(hits.length){
    setHovered(hits[0].object.userData);
  } else {
    clearHovered();
  }
}

function updateDwell(){
  if(!dwellActive||!dwellStart||panelOpen) return;
  const elapsed=performance.now()-dwellStart;
  const progress=Math.min(1,elapsed/DWELL_MS);
  // stroke-dashoffset: 157 = empty, 0 = full
  dwellFill.style.strokeDashoffset=String(157*(1-progress));
  if(progress>=1){
    // Auto-open!
    const c=constCenters.find(cc=>cc.id===hoveredId);
    if(c) openPanel(c);
  }
}

// ── Panel open/close ──────────────────────────────
function openPanel(d){
  panelOpen=true;
  document.getElementById("info-name").textContent=d.name;
  document.getElementById("info-season").textContent=d.season;
  document.getElementById("info-myth").textContent=d.myth;
  document.getElementById("info-panel").classList.add("visible");
  document.getElementById("header").classList.add("hidden");
  constLabel.classList.remove("visible");
  hintEl.classList.remove("visible");
  dwellRing.classList.remove("visible");
  dwellActive=false; dwellStart=null;
  dwellFill.style.strokeDashoffset="157";
}
window.closePanel=function(){
  panelOpen=false;
  document.getElementById("info-panel").classList.remove("visible");
  document.getElementById("header").classList.remove("hidden");
};

// ── VR Entry — with dom-overlay + select event ─────
window.enterVR=async function(){
  if(!navigator.xr){alert("WebXR not available — open in Quest browser!");return;}
  const ok=await navigator.xr.isSessionSupported("immersive-vr").catch(()=>false);
  if(!ok){alert("Immersive VR not supported.");return;}

  const sessionInit={
    optionalFeatures:["local-floor","bounded-floor","hand-tracking","dom-overlay"],
    domOverlay:{root:document.getElementById("overlay")}
  };
  const session=await navigator.xr.requestSession("immersive-vr",sessionInit);
  renderer.xr.setSession(session);
  document.getElementById("vr-btn").style.display="none";

  // Wire up controller trigger AND hand pinch -> open panel
  session.addEventListener("selectstart",()=>{
    if(panelOpen){ closePanel(); return; }
    if(hoveredId){
      const c=constCenters.find(cc=>cc.id===hoveredId);
      if(c) openPanel(c);
    }
  });
};

// ── Desktop/Touch look controls ───────────────────
let rotX=0.18,rotY=Math.PI;
camera.rotation.set(rotX,rotY,0,"YXZ");
let dragStart=null,isDrag=false;

function onDown(x,y){dragStart={x,y};isDrag=false;}
function onMove(x,y){
  if(!dragStart)return;
  const dx=x-dragStart.x,dy=y-dragStart.y;
  if(Math.abs(dx)>4||Math.abs(dy)>4)isDrag=true;
  rotY-=dx*0.004; rotX-=dy*0.004;
  rotX=Math.max(-Math.PI/2,Math.min(Math.PI/2,rotX));
  dragStart={x,y};
  camera.rotation.set(rotX,rotY,0,"YXZ");
}
function onUp(){
  if(!isDrag&&!panelOpen&&hoveredId){
    const c=constCenters.find(cc=>cc.id===hoveredId);
    if(c)openPanel(c);
  }
  dragStart=null;
}
canvas.addEventListener("mousedown",e=>onDown(e.clientX,e.clientY));
canvas.addEventListener("mousemove",e=>onMove(e.clientX,e.clientY));
canvas.addEventListener("mouseup",onUp);
canvas.addEventListener("mouseleave",()=>{dragStart=null;});
canvas.addEventListener("touchstart",e=>{e.preventDefault();onDown(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
canvas.addEventListener("touchmove",e=>{e.preventDefault();onMove(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
canvas.addEventListener("touchend",e=>{e.preventDefault();onUp();},{passive:false});

// ── Time ──────────────────────────────────────────
(function tick(){
  document.getElementById("time-display").textContent=
    new Date().toLocaleString("en-US",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit",timeZoneName:"short"});
  setTimeout(tick,30000);
})();

// ── Resize ────────────────────────────────────────
window.addEventListener("resize",()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

// ── Render loop ───────────────────────────────────
let frame=0;
renderer.setAnimationLoop(()=>{
  frame++;
  if(frame%5===0) checkGaze();
  updateDwell();
  // Twinkle
  if(frame%2===0){
    for(let i=0;i<30;i++){
      const idx=Math.floor(Math.random()*szAttr.count);
      szAttr.array[idx]=baseSizes[idx]*(0.8+Math.random()*0.4);
    }
    szAttr.needsUpdate=true;
  }
  renderer.render(scene,camera);
});

// ── Boot ──────────────────────────────────────────
setTimeout(()=>{
  document.getElementById("loading").classList.add("fade");
  setTimeout(()=>{document.getElementById("loading").style.display="none";},1000);
  // Show initial hint then fade
  hintEl.classList.add("visible");
  setTimeout(()=>{ if(!hoveredId) hintEl.classList.remove("visible"); },4000);
},1000);
</script>
</body>
</html>
