<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Chaos | Official Landing</title>
    <style>
        body {
            background-color: #0d0d0d; /* Deep Midnight */
            color: #dcdcdc; /* Silver Text */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            text-align: center;
            border: 2px solid #5a189a; /* House Chaos Purple */
            padding: 50px;
            border-radius: 20px;
            background: rgba(20, 20, 20, 0.8);
            box-shadow: 0 0 30px rgba(90, 24, 154, 0.5);
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            color: #9d4edd; /* Glowing Purple */
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }
        p {
            font-size: 1.2rem;
            font-style: italic;
            color: #7b2cbf;
        }
        .status-badge {
            margin-top: 20px;
            display: inline-block;
            padding: 10px 20px;
            border: 1px solid #3c096c;
            border-radius: 50px;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>House Chaos</h1>
        <p>Foundation for SoulSpark • Establishing Sovereignty</p>
        <div class="status-badge">Construction in Progress • Librarian Guarded</div>
    </div>
</body>
</html>
