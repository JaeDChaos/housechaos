<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChaosPage Builder 🦊</title>
<link href="https://fonts.googleapis.com/css2?family=Chewy&family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
  :root {
    --crimson: #8b0000;
    --crimson-bright: #c0392b;
    --crimson-glow: #e74c3c;
    --crimson-muted: #5c1010;
    --dark: #0d0d0d;
    --dark2: #141414;
    --dark3: #1a1a1a;
    --dark4: #222222;
    --dark5: #2a2a2a;
    --silver: #c0c0c0;
    --silver-dim: #888;
    --silver-bright: #e8e8e8;
    --text: #f0f0f0;
    --text-muted: #aaa;
    --accent: #ff6b6b;
    --border: rgba(139,0,0,0.4);
    --border-bright: rgba(192,57,43,0.7);
    --radius: 8px;
    --radius-lg: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Patrick Hand', cursive;
    background: var(--dark);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    background: var(--dark2);
    border-bottom: 1px solid var(--border-bright);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }
  header h1 {
    font-family: 'Chewy', cursive;
    font-size: 22px;
    color: var(--crimson-glow);
    letter-spacing: 1px;
    text-shadow: 0 0 12px rgba(231,76,60,0.3);
  }
  header .tagline {
    font-size: 12px;
    color: var(--silver-dim);
    margin-top: 1px;
  }
  .header-actions {
    margin-left: auto;
    display: flex;
    gap: 8px;
  }

  /* ── BUTTONS ── */
  .btn {
    font-family: 'Patrick Hand', cursive;
    font-size: 13px;
    padding: 6px 14px;
    border-radius: var(--radius);
    border: 1px solid var(--border-bright);
    background: var(--dark3);
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn:hover { background: var(--dark5); border-color: var(--crimson-glow); }
  .btn:active { transform: scale(0.97); }
  .btn-primary {
    background: var(--crimson);
    border-color: var(--crimson-bright);
    color: #fff;
  }
  .btn-primary:hover { background: var(--crimson-bright); }
  .btn-danger {
    background: transparent;
    border-color: rgba(180,30,30,0.5);
    color: #e88;
    font-size: 11px;
    padding: 3px 8px;
  }
  .btn-danger:hover { background: rgba(139,0,0,0.3); border-color: var(--crimson-bright); color: #faa; }
  .btn-up, .btn-dn {
    background: transparent;
    border-color: rgba(255,255,255,0.1);
    color: var(--silver-dim);
    font-size: 11px;
    padding: 3px 7px;
  }
  .btn-up:hover, .btn-dn:hover { background: var(--dark4); color: var(--silver); }

  /* ── MAIN LAYOUT ── */
  main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── LEFT PANEL ── */
  .panel-left {
    width: 260px;
    flex-shrink: 0;
    background: var(--dark2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }
  .panel-section {
    padding: 14px;
    border-bottom: 1px solid rgba(139,0,0,0.2);
  }
  .panel-section h2 {
    font-family: 'Chewy', cursive;
    font-size: 13px;
    color: var(--crimson-glow);
    letter-spacing: 0.5px;
    margin-bottom: 10px;
    text-transform: uppercase;
  }
  .block-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .block-btn {
    font-family: 'Patrick Hand', cursive;
    font-size: 12px;
    padding: 8px 6px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--dark3);
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    line-height: 1.3;
  }
  .block-btn:hover {
    background: var(--dark4);
    border-color: var(--crimson-glow);
    color: #fff;
    transform: translateY(-1px);
  }
  .block-btn:active { transform: scale(0.97) translateY(0); }
  .block-btn .bb-icon { font-size: 18px; display: block; margin-bottom: 3px; }
  .block-btn .bb-label { display: block; }

  /* options */
  .opt-group { margin-bottom: 10px; }
  .opt-group label { font-size: 12px; color: var(--text-muted); display: block; margin-bottom: 4px; }
  .opt-group select, .opt-group input[type="text"] {
    width: 100%;
    font-family: 'Patrick Hand', cursive;
    font-size: 12px;
    background: var(--dark3);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: var(--radius);
    padding: 5px 8px;
    outline: none;
  }
  .opt-group select:focus, .opt-group input:focus { border-color: var(--crimson-glow); }
  .opt-group input[type="color"] {
    width: 100%;
    height: 30px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--dark3);
    cursor: pointer;
    padding: 2px;
  }

  /* ── MIDDLE: CANVAS ── */
  .panel-canvas {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--dark);
  }
  .canvas-bar {
    background: var(--dark2);
    border-bottom: 1px solid var(--border);
    padding: 8px 14px;
    font-size: 12px;
    color: var(--silver-dim);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .canvas-bar span { color: var(--crimson-glow); font-size: 11px; }
  .block-list {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .block-list:empty::after {
    content: "✦  Click a block button on the left to start building  ✦";
    color: var(--silver-dim);
    font-size: 13px;
    text-align: center;
    margin-top: 60px;
    display: block;
  }

  /* ── BLOCK CARDS ── */
  .block-card {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 10px 12px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
    transition: border-color 0.15s;
  }
  .block-card:hover { border-color: rgba(192,57,43,0.5); }
  .block-card.selected { border-color: var(--crimson-glow); }
  .block-card-icon {
    font-size: 20px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .block-card-body { flex: 1; min-width: 0; }
  .block-card-type {
    font-size: 10px;
    color: var(--crimson-glow);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 3px;
  }
  .block-card-preview {
    font-size: 13px;
    color: var(--silver);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }
  .block-card-actions {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
    align-items: flex-start;
    flex-direction: column;
  }
  .block-card-row { display: flex; gap: 4px; }

  /* ── RIGHT PANEL: PREVIEW ── */
  .panel-preview {
    width: 380px;
    flex-shrink: 0;
    background: var(--dark2);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
  }
  .preview-bar {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    font-family: 'Chewy', cursive;
    font-size: 13px;
    color: var(--crimson-glow);
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .preview-bar .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--crimson-glow); }
  .preview-frame {
    flex: 1;
    overflow-y: auto;
    background: #fff;
    padding: 20px;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 15px;
    color: #222;
    line-height: 1.6;
  }
  .preview-frame h1 { font-size: 26px; margin-bottom: 8px; }
  .preview-frame h2 { font-size: 20px; margin-bottom: 6px; margin-top: 12px; }
  .preview-frame h3 { font-size: 16px; margin-bottom: 4px; margin-top: 10px; }
  .preview-frame p { margin-bottom: 10px; }
  .preview-frame ul, .preview-frame ol { padding-left: 22px; margin-bottom: 10px; }
  .preview-frame li { margin-bottom: 3px; }
  .preview-frame hr { border: none; border-top: 1px solid #ddd; margin: 14px 0; }
  .preview-frame table { border-collapse: collapse; width: 100%; margin-bottom: 10px; font-size: 14px; }
  .preview-frame th { background: #f0f0f0; border: 1px solid #ccc; padding: 6px 10px; text-align: left; }
  .preview-frame td { border: 1px solid #ccc; padding: 5px 10px; }
  .preview-frame a { color: #1a6faf; }
  .preview-frame blockquote { border-left: 3px solid #ccc; padding-left: 12px; color: #555; font-style: italic; margin: 10px 0; }
  .preview-frame .page-title-block { text-align: center; padding: 20px 0 10px; border-bottom: 2px solid #eee; margin-bottom: 16px; }
  .preview-frame .page-title-block h1 { margin-bottom: 4px; }
  .preview-frame .page-title-block p { color: #666; font-size: 14px; }

  /* ── MODAL for editing ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
  }
  .modal-overlay.hidden { display: none; }
  .modal {
    background: var(--dark2);
    border: 1px solid var(--border-bright);
    border-radius: var(--radius-lg);
    padding: 20px;
    width: 420px;
    max-width: 95vw;
    max-height: 85vh;
    overflow-y: auto;
  }
  .modal h3 {
    font-family: 'Chewy', cursive;
    color: var(--crimson-glow);
    font-size: 16px;
    margin-bottom: 14px;
    letter-spacing: 0.5px;
  }
  .modal label { font-size: 13px; color: var(--text-muted); display: block; margin-bottom: 4px; margin-top: 10px; }
  .modal input[type="text"],
  .modal input[type="url"],
  .modal textarea,
  .modal select {
    width: 100%;
    font-family: 'Patrick Hand', cursive;
    font-size: 13px;
    background: var(--dark3);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: var(--radius);
    padding: 7px 10px;
    outline: none;
    resize: vertical;
  }
  .modal input:focus, .modal textarea:focus, .modal select:focus { border-color: var(--crimson-glow); }
  .modal-actions { margin-top: 16px; display: flex; gap: 8px; justify-content: flex-end; }
  .modal textarea { min-height: 80px; }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 20px; left: 50%;
    transform: translateX(-50%);
    background: var(--crimson);
    color: #fff;
    font-family: 'Patrick Hand', cursive;
    font-size: 13px;
    padding: 8px 20px;
    border-radius: 20px;
    z-index: 200;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }

  /* scrollbars */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--dark2); }
  ::-webkit-scrollbar-thumb { background: var(--crimson-muted); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--crimson); }
</style>
</head>
<body>

<header>
  <div>
    <h1>🦊 ChaosPage Builder</h1>
    <div class="tagline">click buttons · build pages · copy html</div>
  </div>
  <div class="header-actions">
    <button class="btn" onclick="clearAll()">🗑 Clear All</button>
    <button class="btn btn-primary" onclick="copyHTML()">📋 Copy HTML</button>
  </div>
</header>

<main>

  <!-- LEFT PANEL -->
  <div class="panel-left">

    <div class="panel-section">
      <h2>📝 Text Blocks</h2>
      <div class="block-grid">
        <button class="block-btn" onclick="addBlock('h1')">
          <span class="bb-icon">H1</span>
          <span class="bb-label">Big Header</span>
        </button>
        <button class="block-btn" onclick="addBlock('h2')">
          <span class="bb-icon">H2</span>
          <span class="bb-label">Header</span>
        </button>
        <button class="block-btn" onclick="addBlock('h3')">
          <span class="bb-icon">H3</span>
          <span class="bb-label">Subheader</span>
        </button>
        <button class="block-btn" onclick="addBlock('p')">
          <span class="bb-icon">¶</span>
          <span class="bb-label">Paragraph</span>
        </button>
        <button class="block-btn" onclick="addBlock('blockquote')">
          <span class="bb-icon">❝</span>
          <span class="bb-label">Quote</span>
        </button>
        <button class="block-btn" onclick="addBlock('hr')">
          <span class="bb-icon">──</span>
          <span class="bb-label">Divider</span>
        </button>
      </div>
    </div>

    <div class="panel-section">
      <h2>📋 Lists</h2>
      <div class="block-grid">
        <button class="block-btn" onclick="addBlock('ul')">
          <span class="bb-icon">•</span>
          <span class="bb-label">Bullet List</span>
        </button>
        <button class="block-btn" onclick="addBlock('ol')">
          <span class="bb-icon">1.</span>
          <span class="bb-label">Numbered</span>
        </button>
      </div>
    </div>

    <div class="panel-section">
      <h2>📊 Structure</h2>
      <div class="block-grid">
        <button class="block-btn" onclick="addBlock('table')">
          <span class="bb-icon">⊞</span>
          <span class="bb-label">Table</span>
        </button>
        <button class="block-btn" onclick="addBlock('pagetitle')">
          <span class="bb-icon">🏠</span>
          <span class="bb-label">Page Title</span>
        </button>
      </div>
    </div>

    <div class="panel-section">
      <h2>🔗 Links</h2>
      <div class="block-grid">
        <button class="block-btn" onclick="addBlock('link')">
          <span class="bb-icon">🔗</span>
          <span class="bb-label">Link</span>
        </button>
        <button class="block-btn" onclick="addBlock('linkline')">
          <span class="bb-icon">↗</span>
          <span class="bb-label">Link Line</span>
        </button>
      </div>
    </div>

    <div class="panel-section">
      <h2>⚙️ Page Options</h2>
      <div class="opt-group">
        <label>Page title (tab name)</label>
        <input type="text" id="opt-title" value="My Page" placeholder="My Page">
      </div>
      <div class="opt-group">
        <label>Background color</label>
        <input type="color" id="opt-bg" value="#ffffff">
      </div>
      <div class="opt-group">
        <label>Text color</label>
        <input type="color" id="opt-fg" value="#222222">
      </div>
      <div class="opt-group">
        <label>Max content width</label>
        <select id="opt-width">
          <option value="600px">Narrow (600px)</option>
          <option value="800px" selected>Normal (800px)</option>
          <option value="1000px">Wide (1000px)</option>
          <option value="100%">Full width</option>
        </select>
      </div>
    </div>

  </div>

  <!-- MIDDLE: BLOCK LIST -->
  <div class="panel-canvas">
    <div class="canvas-bar">
      <span>🧱 BLOCKS</span>
      — drag to reorder, click ✏️ to edit
    </div>
    <div class="block-list" id="block-list"></div>
  </div>

  <!-- RIGHT PANEL: PREVIEW -->
  <div class="panel-preview">
    <div class="preview-bar">
      <div class="dot"></div>
      LIVE PREVIEW
    </div>
    <div class="preview-frame" id="preview-frame"></div>
  </div>

</main>

<!-- EDIT MODAL -->
<div class="modal-overlay hidden" id="modal-overlay">
  <div class="modal" id="modal">
    <h3 id="modal-title">Edit Block</h3>
    <div id="modal-fields"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveModal()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let blocks = [];
let editingId = null;
let dragSrcIdx = null;

function uid() {
  return Math.random().toString(36).slice(2,9);
}

const DEFAULTS = {
  h1:         { text: 'Big Header' },
  h2:         { text: 'Section Header' },
  h3:         { text: 'Subsection' },
  p:          { text: 'Write your paragraph text here. You can say as much as you like.' },
  blockquote: { text: 'A meaningful quote or note goes here.' },
  hr:         {},
  ul:         { items: 'First item\nSecond item\nThird item' },
  ol:         { items: 'First item\nSecond item\nThird item' },
  table:      { cols: 'Name,Value,Notes', rows: 'Row 1 A,Row 1 B,Row 1 C\nRow 2 A,Row 2 B,Row 2 C' },
  pagetitle:  { title: 'Page Title', subtitle: 'A short description of this page' },
  link:       { label: 'Click here', url: 'https://' },
  linkline:   { label: 'Useful Link', url: 'https://', desc: 'A short description' },
};

const ICONS = {
  h1:'H1', h2:'H2', h3:'H3', p:'¶', blockquote:'❝', hr:'──',
  ul:'•', ol:'1.', table:'⊞', pagetitle:'🏠', link:'🔗', linkline:'↗'
};

const TYPE_LABELS = {
  h1:'Big Header', h2:'Header', h3:'Subheader', p:'Paragraph',
  blockquote:'Quote', hr:'Divider', ul:'Bullet List', ol:'Numbered List',
  table:'Table', pagetitle:'Page Title', link:'Link', linkline:'Link Line'
};

function addBlock(type) {
  const block = { id: uid(), type, data: Object.assign({}, DEFAULTS[type]) };
  blocks.push(block);
  renderBlocks();
  renderPreview();
  // open edit modal for non-trivial blocks
  if (type !== 'hr') openModal(block.id);
}

function renderBlocks() {
  const list = document.getElementById('block-list');
  list.innerHTML = '';
  blocks.forEach((b, i) => {
    const card = document.createElement('div');
    card.className = 'block-card';
    card.draggable = true;
    card.dataset.idx = i;
    card.addEventListener('dragstart', e => { dragSrcIdx = i; e.dataTransfer.effectAllowed = 'move'; });
    card.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; });
    card.addEventListener('drop', e => {
      e.preventDefault();
      if (dragSrcIdx === null || dragSrcIdx === i) return;
      const moved = blocks.splice(dragSrcIdx, 1)[0];
      blocks.splice(i, 0, moved);
      dragSrcIdx = null;
      renderBlocks(); renderPreview();
    });

    const preview = blockPreviewText(b);
    card.innerHTML = `
      <div class="block-card-icon">${ICONS[b.type]}</div>
      <div class="block-card-body">
        <div class="block-card-type">${TYPE_LABELS[b.type]}</div>
        <div class="block-card-preview">${preview}</div>
      </div>
      <div class="block-card-actions">
        <div class="block-card-row">
          <button class="btn btn-up" onclick="moveBlock(${i},-1)" title="Move up">↑</button>
          <button class="btn btn-dn" onclick="moveBlock(${i},1)" title="Move down">↓</button>
        </div>
        ${b.type !== 'hr' ? `<button class="btn" style="font-size:11px;padding:3px 8px;" onclick="openModal('${b.id}')">✏️ Edit</button>` : ''}
        <button class="btn btn-danger" onclick="removeBlock('${b.id}')">✕ Remove</button>
      </div>
    `;
    list.appendChild(card);
  });
}

function blockPreviewText(b) {
  const d = b.data;
  switch(b.type) {
    case 'h1': case 'h2': case 'h3': return escHtml(d.text || '');
    case 'p': return escHtml((d.text || '').slice(0,60)) + ((d.text||'').length > 60 ? '…' : '');
    case 'blockquote': return '❝ ' + escHtml((d.text||'').slice(0,50));
    case 'hr': return '<span style="color:#555">── horizontal rule ──</span>';
    case 'ul': case 'ol': return escHtml(((d.items||'').split('\n')[0]||'')) + '…';
    case 'table': return 'Columns: ' + escHtml(d.cols||'');
    case 'pagetitle': return escHtml(d.title||'');
    case 'link': return escHtml(d.label||'');
    case 'linkline': return escHtml(d.label||'') + ' → ' + escHtml((d.url||'').slice(0,30));
    default: return '';
  }
}

function moveBlock(i, dir) {
  const j = i + dir;
  if (j < 0 || j >= blocks.length) return;
  [blocks[i], blocks[j]] = [blocks[j], blocks[i]];
  renderBlocks(); renderPreview();
}

function removeBlock(id) {
  blocks = blocks.filter(b => b.id !== id);
  renderBlocks(); renderPreview();
}

function clearAll() {
  if (!confirm('Clear all blocks and start fresh?')) return;
  blocks = [];
  renderBlocks(); renderPreview();
}

/* ── MODAL ── */
function openModal(id) {
  editingId = id;
  const b = blocks.find(x => x.id === id);
  if (!b) return;
  document.getElementById('modal-title').textContent = 'Edit: ' + TYPE_LABELS[b.type];
  document.getElementById('modal-fields').innerHTML = modalFields(b);
  document.getElementById('modal-overlay').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.add('hidden');
  editingId = null;
}

function saveModal() {
  const b = blocks.find(x => x.id === editingId);
  if (!b) return closeModal();
  const fields = document.getElementById('modal-fields');
  fields.querySelectorAll('[data-key]').forEach(el => {
    b.data[el.dataset.key] = el.value;
  });
  closeModal();
  renderBlocks(); renderPreview();
}

function modalFields(b) {
  const d = b.data;
  const tf = (key, label, val, hint) =>
    `<label>${label}</label><input type="text" data-key="${key}" value="${escAttr(val||'')}" placeholder="${escAttr(hint||'')}">`;
  const ta = (key, label, val, hint) =>
    `<label>${label}</label><textarea data-key="${key}" placeholder="${escAttr(hint||'')}">${escHtml(val||'')}</textarea>`;
  const sel = (key, label, opts, cur) =>
    `<label>${label}</label><select data-key="${key}">${opts.map(o=>`<option value="${o}"${cur===o?' selected':''}>${o}</option>`).join('')}</select>`;

  switch(b.type) {
    case 'h1': case 'h2': case 'h3':
      return tf('text', 'Header text', d.text, 'Enter your header...');
    case 'p':
      return ta('text', 'Paragraph text', d.text, 'Write your paragraph here...');
    case 'blockquote':
      return ta('text', 'Quote text', d.text, 'A quote or callout...');
    case 'ul': case 'ol':
      return ta('items', 'List items (one per line)', d.items, 'First item\nSecond item\nThird item');
    case 'table':
      return tf('cols','Column headers (comma-separated)',d.cols,'Name,Value,Notes') +
             ta('rows','Rows (one per line, comma-separated)',d.rows,'Alice,1,Notes here\nBob,2,More notes');
    case 'pagetitle':
      return tf('title','Page title',d.title,'My Page') +
             tf('subtitle','Subtitle (optional)',d.subtitle,'A description');
    case 'link':
      return tf('label','Link text',d.label,'Click here') +
             `<label>URL</label><input type="url" data-key="url" value="${escAttr(d.url||'')}" placeholder="https://...">`;
    case 'linkline':
      return tf('label','Link label',d.label,'Useful link') +
             `<label>URL</label><input type="url" data-key="url" value="${escAttr(d.url||'')}" placeholder="https://...">` +
             tf('desc','Short description (optional)',d.desc,'What this link is about');
    default: return '';
  }
}

/* ── PREVIEW ── */
function renderPreview() {
  const frame = document.getElementById('preview-frame');
  const bg = document.getElementById('opt-bg').value;
  const fg = document.getElementById('opt-fg').value;
  const width = document.getElementById('opt-width').value;
  frame.style.background = bg;
  frame.style.color = fg;
  let html = `<div style="max-width:${width};margin:0 auto;">`;
  html += blocks.map(renderBlockHTML).join('\n');
  html += '</div>';
  frame.innerHTML = html;
}

function renderBlockHTML(b) {
  const d = b.data;
  switch(b.type) {
    case 'h1': return `<h1>${escHtml(d.text||'')}</h1>`;
    case 'h2': return `<h2>${escHtml(d.text||'')}</h2>`;
    case 'h3': return `<h3>${escHtml(d.text||'')}</h3>`;
    case 'p':  return `<p>${escHtml(d.text||'').replace(/\n/g,'<br>')}</p>`;
    case 'blockquote': return `<blockquote>${escHtml(d.text||'')}</blockquote>`;
    case 'hr': return `<hr>`;
    case 'ul': {
      const items = (d.items||'').split('\n').filter(x=>x.trim());
      return `<ul>${items.map(x=>`<li>${escHtml(x)}</li>`).join('')}</ul>`;
    }
    case 'ol': {
      const items = (d.items||'').split('\n').filter(x=>x.trim());
      return `<ol>${items.map(x=>`<li>${escHtml(x)}</li>`).join('')}</ol>`;
    }
    case 'table': {
      const cols = (d.cols||'').split(',').map(x=>x.trim());
      const rows = (d.rows||'').split('\n').filter(x=>x.trim()).map(r=>r.split(',').map(x=>x.trim()));
      return `<table><thead><tr>${cols.map(c=>`<th>${escHtml(c)}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${cols.map((_,i)=>`<td>${escHtml(r[i]||'')}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
    }
    case 'pagetitle':
      return `<div class="page-title-block"><h1>${escHtml(d.title||'')}</h1>${d.subtitle?`<p>${escHtml(d.subtitle)}</p>`:''}</div>`;
    case 'link':
      return `<p><a href="${escAttr(d.url||'#')}">${escHtml(d.label||'Link')}</a></p>`;
    case 'linkline':
      return `<p><a href="${escAttr(d.url||'#')}">${escHtml(d.label||'Link')}</a>${d.desc?` — ${escHtml(d.desc)}`:''}`;
    default: return '';
  }
}

/* ── COPY HTML ── */
function copyHTML() {
  const bg = document.getElementById('opt-bg').value;
  const fg = document.getElementById('opt-fg').value;
  const width = document.getElementById('opt-width').value;
  const title = document.getElementById('opt-title').value || 'My Page';
  const body = blocks.map(renderBlockHTML).join('\n  ');
  const out = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>${escHtml(title)}</title>
<style>
  body {
    font-family: Arial, Helvetica, sans-serif;
    background: ${bg};
    color: ${fg};
    font-size: 16px;
    line-height: 1.6;
    margin: 0;
    padding: 20px;
  }
  .page-wrap { max-width: ${width}; margin: 0 auto; }
  h1 { font-size: 2em; margin-bottom: 0.4em; }
  h2 { font-size: 1.5em; margin-bottom: 0.3em; margin-top: 1em; }
  h3 { font-size: 1.2em; margin-bottom: 0.3em; margin-top: 0.8em; }
  p { margin-bottom: 0.8em; }
  ul, ol { padding-left: 1.5em; margin-bottom: 0.8em; }
  li { margin-bottom: 0.2em; }
  hr { border: none; border-top: 1px solid #ccc; margin: 1em 0; }
  table { border-collapse: collapse; width: 100%; margin-bottom: 1em; }
  th { background: #f0f0f0; border: 1px solid #ccc; padding: 6px 10px; text-align: left; }
  td { border: 1px solid #ccc; padding: 5px 10px; }
  a { color: #1a6faf; }
  blockquote { border-left: 3px solid #ccc; padding-left: 1em; color: #555; font-style: italic; margin: 1em 0; }
  .page-title-block { text-align: center; padding: 1.5em 0 0.8em; border-bottom: 2px solid #eee; margin-bottom: 1em; }
</style>
</head>
<body>
<div class="page-wrap">
  ${body}
</div>
</body>
</html>`;
  navigator.clipboard.writeText(out).then(() => showToast('✅ HTML copied! Paste it anywhere.')).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = out; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    showToast('✅ HTML copied!');
  });
}

/* ── TOAST ── */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

/* ── UTILS ── */
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

/* live preview on option changes */
['opt-bg','opt-fg','opt-width','opt-title'].forEach(id => {
  document.getElementById(id).addEventListener('input', renderPreview);
});

/* close modal on overlay click */
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

/* init */
renderPreview();
</script>
</body>
</html>
